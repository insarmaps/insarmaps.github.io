<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Subsidence map of Iran</title>
        <!-- leaflet -->
        <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js" integrity="sha256-WBkoXOwTeyKclOHuWtc+i2uENFpDZ9YPdf5Hf+D7ewM=" crossorigin=""></script>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" integrity="sha256-kLaT2GOSpHechhsozzB+flnD+zUyjE2LlfWPgU04xyI=" crossorigin="" />
        <!-- math and jquery -->
        <script src="https://unpkg.com/mathjs/lib/browser/math.js"></script>
        <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
        <!-- my functions -->

        <link rel="stylesheet" type="text/css" href="./style.css">
        <link rel="stylesheet" type="text/css" href="./colorbar.css">
        <link rel="stylesheet" href="./map.css">
    </head>
    <body>
        <!-- setting panel -->
        <div id='colorBarButton' class="settingPannel">
            <div class="grid-container">
                <label>Opacity: <span id="slider-value">100%</span></label>
                <input id="slider" type="range" min="0" max="100" step="5" value="100"/>
                <div>
                    <span style="float:left;" > 
                        <label>Colormap range: </label>
                        <input type="text" value="0" id="colorBarMin" size="2" onchange="updateWMS(lyr)">
                    </span>
                    <span style="float:left;">
                        <label>-</label>
                        <input type="text" value="20" id="colorBarMax" size="2" onchange="updateWMS(lyr)">
                    </span>
                </div>
            </div>    
        </div>
        <!-- colorbar -->
        <div class="colorbarPanel" id="colorbarPanel">
            <div id='colorBar' class="colorBar_spectral">        
                <p style="text-align:center; padding-top:0%">
                    <span id='colorBarLeft' style="float:left;color:black;top:0"> 0 </span>
                    <span id='colorBarCenter' style="float:center;color:black;top:0"> 10 </span>
                    <span id='colorBarRight' style="float:right;color:black;top:0"> 20 </span>
                </p>
             </div>  
             <p style="text-align:center;">    
                <span id='unit'> Subsidence rate (cm/year) </span>
             </p>
         </div>
        <!-- quickinfo -->
        <div id='quickInfo' class='quickInfoPanel'>
            <div class="grid-container">
            <!-- <div>Subsidence rate (cm/year): <span id='Subsidence'></span></div> -->
            <div>Lon,Lat: <span id='Lon'></span>,<span id='Lat'></span></div>
            </div>    
        </div>
        <div id="map"></div>
        <script src="basemaps.js"></script>
        <script src="map.js"></script>
    </body>
</html>
